name: crisis-command
version: "1.0.0"
description: >
  Multi-turn crisis communication environment where an agent manages
  unfolding real-world incidents across employees, customers, regulators,
  and press while handling false information, deadlines, and consistency risk.
runtime:
  type: python
  working_dir: server
server:
  entrypoint:
    command: uvicorn
    args:
      - app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
interfaces:
  type: http
  health: /health
  reset: /reset
  step: /step
  state: /state
metadata:
  default_task: data-breach
  task_count: 3
